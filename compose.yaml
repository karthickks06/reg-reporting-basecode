services:
  postgres:
    image: postgres:16
    container_name: fca-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fca_app}
      POSTGRES_USER: ${POSTGRES_USER:-fca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fca_pass}
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fca_user} -d ${POSTGRES_DB:-fca_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: fca-chroma
    ports:
      - "${CHROMA_PORT_HOST:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fca-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app:Z
      - ./data:/data:Z
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-8000}/api
    container_name: fca-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fca-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./backend:/app:Z
      - ./data:/data:Z
    command: python start_worker.py

volumes:
  postgres_data:
  chroma_data:
